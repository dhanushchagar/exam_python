<!DOCTYPE html>
<html>
<head>
    <title>Exam</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            background: #2a5298;
            color: white;
            padding: 15px;
            border-radius: 8px;
        }

        .timer {
            font-size: 18px;
            font-weight: bold;
        }

        .question-box {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            box-shadow: 0px 3px 8px rgba(0,0,0,0.1);
        }

        pre {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        label {
            display: block;
            padding: 5px;
            cursor: pointer;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<div class="header">
    <div>Online Examination</div>
    <div class="timer">Time Left: <span id="timer"></span></div>
</div>

<form method="POST" id="examform">
    {% for q in questions %}
    <div class="question-box">
        <pre><b>{{ q.id }}. {{ q.question }}</b></pre>

        {% for opt in q.options %}
            <label>
                <input type="radio" name="{{ q.id }}" value="{{ opt }}" required>
                {{ opt }}
            </label>
        {% endfor %}
    </div>
    {% endfor %}

    <button type="submit">Submit Exam</button>
</form>
<script>
let timeLeft = {{ time_left }};
let warningCount = 0;

// Store original screen size
let originalWidth = window.innerWidth;
let originalHeight = window.innerHeight;

// ---------------- TIMER ---------------- //
function startTimer() {
    let timer = setInterval(function() {
        timeLeft--;
        if (timeLeft <= 0) {
            clearInterval(timer);
            document.getElementById("examform").submit();
        }
        document.getElementById("timer").innerHTML =
            Math.floor(timeLeft/60) + ":" + (timeLeft%60);
    }, 1000);
}

// ---------------- MOBILE APP SWITCH DETECTION ---------------- //
document.addEventListener("visibilitychange", function() {
    if (document.hidden) {
        warningCount++;
        alert("⚠️ Don't leave the exam!");

        if (warningCount >= 1) {
            alert("❌ Exam auto submitted!");
            window.location.href = "/submit";
        }
    }
});

// ---------------- SCREEN MINIMIZE / BACK BUTTON ---------------- //
window.addEventListener("pagehide", function() {
    alert("❌ You left the exam!");
    window.location.href = "/submit";
});

// ---------------- SPLIT SCREEN DETECTION ---------------- //
window.addEventListener("resize", function () {
    let currentWidth = window.innerWidth;
    let currentHeight = window.innerHeight;

    // Detect significant size reduction (split screen)
    if (currentWidth < originalWidth - 100 || currentHeight < originalHeight - 100) {
        warningCount++;

        alert("❌ Split screen detected! Not allowed.");

        if (warningCount >= 1) {
            alert("❌ Exam auto submitted!");
            window.location.href = "/submit";
        }
    }
});

// ---------------- ORIENTATION CHANGE (MOBILE) ---------------- //
window.addEventListener("orientationchange", function () {
    warningCount++;
    alert("⚠️ Orientation change detected!");

    if (warningCount >= 2) {
        alert("❌ Exam auto submitted!");
        window.location.href = "/submit";
    }
});

// ---------------- TOUCH BLOCK (COPY PREVENT) ---------------- //
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", function(e) {
    alert("❌ Pasting is not allowed!");
    e.preventDefault();
});

// ---------------- DISABLE LONG PRESS ---------------- //
document.addEventListener("contextmenu", function(e) {
    e.preventDefault();
});

// ---------------- FORCE FULLSCREEN ---------------- //
function enterFullScreen() {
    let elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    }
}

// ---------------- PREVENT BACK NAVIGATION ---------------- //
history.pushState(null, null, location.href);
window.onpopstate = function () {
    alert("❌ Back button disabled!");
    history.go(1);
};

// ---------------- START ---------------- //
window.onload = function() {
    startTimer();
    enterFullScreen();
};
</script>
</body>
</html>
